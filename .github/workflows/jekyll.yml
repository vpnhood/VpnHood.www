name: Build and deploy Jekyll site to GitHub Pages

# Builds the site with the exact Jekyll version pinned in the Gemfile (4.3),
# then publishes the generated _site to GitHub Pages. This replaces the legacy
# branch builder (which used Jekyll 3.9) so the published site matches what we
# build and test locally.

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Rebuild weekly so legal pages stay synced with the GitHub wiki even when no
  # code is pushed (the wiki can change independently of this repo).
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC

# Permissions required by the official Pages deploy actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true   # runs bundle install from Gemfile.lock and caches gems

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      # Pull the latest legal text from the VpnHood GitHub wiki so the privacy /
      # terms pages stay synced. Baked into static HTML at build time (no runtime
      # fetch). If a fetch fails, the step fails and the build is skipped — that's
      # fine: GitHub Pages keeps serving the previous successful deployment.
      - name: Sync legal pages from wiki
        run: |
          for p in VpnHood-CLIENT-Privacy-Policy VpnHood-CONNECT-Privacy-Policy VpnHood-MANAGER-Privacy-Policy VpnHood-MANAGER-Terms-of-Use; do
            curl -sfL "https://raw.githubusercontent.com/wiki/vpnhood/VpnHood/$p.md" -o "_includes/legals/$p.md"
            echo "synced $p"
          done

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
