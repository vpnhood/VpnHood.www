# Jekyll Configuration for VpnHood (static marketing site)
title: VpnHood!
description: "VpnHood! – A free, secure, and open-source VPN with a global server network designed to protect your online privacy and ensure secure access to the web."
url: "https://www.vpnhood.com"
baseurl: ""
lang: en-us
author: VpnHood

# Social media & SEO (consumed by jekyll-seo-tag)
logo: /assets/images/site-icon.png
twitter:
  username: vpnhood
  card: summary_large_image
social:
  name: VpnHood!
  links:
    - https://x.com/vpnhood
    - https://www.linkedin.com/company/vpnhood
    - https://www.instagram.com/vpnhood
    - https://github.com/vpnhood/VpnHood

# Default OG/Twitter image for every page (override per page with front matter `image:`)
defaults:
  - scope:
      path: ""
    values:
      image: /assets/images/og-image.png

# Build settings
markdown: kramdown
highlighter: rouge

# Sass configuration (sources in _sass/, entry files in assets/css/*.scss)
sass:
  style: compressed
  quiet_deps: true
  silence_deprecations:
    - import
    - global-builtin
    - color-functions

plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

# Exclude non-site files from the build
exclude:
  - README.md
  - CLAUDE.md
  - .legacy_joomla/
  - Gemfile
  - Gemfile.lock
  - .github/
  - .vs/
  - .vscode/

# GitHub Pages
safe: true
incremental: false
